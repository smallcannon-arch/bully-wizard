<!DOCTYPE html>
<html lang="zh-TW">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>校園霸凌事件處理流程</title>
<link href="https://fonts.googleapis.com/css2?family=Noto+Serif+TC:wght@400;600;700&family=Noto+Sans+TC:wght@300;400;500&display=swap" rel="stylesheet">
<style>
:root {
  --ink: #1a1a2e;
  --paper: #f5f3ee;
  --warm: #ede9e0;
  --line: #c5bfb0;
  --accent: #8b1a1a;
  --ok: #1a5c2e;
  --warn: #7a4a00;
  --info: #1a3a5c;
  --ok-light: #d4edda;
  --warn-light: #fff3cd;
  --accent-pale: #fdf0f0;
  --info-light: #ddeeff;
}

*, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
html, body { height: 100%; }
body {
  font-family: 'Noto Sans TC', sans-serif;
  background: var(--paper);
  color: var(--ink);
  font-size: 14px;
  display: flex;
  flex-direction: column;
}

/* ── 頂部 ── */
.top-bar {
  background: var(--ink);
  color: #fff;
  height: 52px;
  padding: 0 1.5rem;
  display: flex;
  align-items: center;
  justify-content: space-between;
  position: sticky;
  top: 0;
  z-index: 200;
  box-shadow: 0 2px 8px rgba(0,0,0,.35);
  flex-shrink: 0;
}
.top-bar-left { display: flex; align-items: center; gap: .75rem; }
.back-btn {
  padding: .28rem .8rem;
  border-radius: 20px;
  border: 1.5px solid rgba(255,255,255,.3);
  background: transparent;
  color: #fff;
  font-family: 'Noto Sans TC', sans-serif;
  font-size: .75rem;
  cursor: pointer;
  white-space: nowrap;
}
.back-btn:hover { background: rgba(255,255,255,.1); }
.top-bar h1 {
  font-family: 'Noto Serif TC', serif;
  font-size: .95rem;
  font-weight: 700;
}
.case-info-bar {
  font-size: .78rem;
  color: rgba(255,255,255,.6);
  border-left: 1px solid rgba(255,255,255,.2);
  padding-left: .75rem;
  max-width: 400px;
  overflow: hidden;
  text-overflow: ellipsis;
  white-space: nowrap;
}

/* ── 主體 ── */
.main {
  flex: 1;
  max-width: 780px;
  margin: 0 auto;
  width: 100%;
  padding: 1.5rem 1.5rem 4rem;
  overflow-y: auto;
}

/* ── 載入中 ── */
.loading-state {
  text-align: center;
  padding: 4rem 1rem;
  color: var(--line);
}
.spinner {
  display: inline-block;
  width: 28px; height: 28px;
  border: 2px solid var(--line);
  border-top-color: var(--ink);
  border-radius: 50%;
  animation: spin .7s linear infinite;
  margin-bottom: .75rem;
}
@keyframes spin { to { transform: rotate(360deg); } }

/* ── 期限狀態卡片 ── */
.deadline-card {
  border-radius: 6px;
  padding: 1rem 1.25rem;
  margin-bottom: 1.5rem;
  display: flex;
  align-items: center;
  gap: 1rem;
  border: 1px solid;
}
.deadline-card.red {
  background: var(--accent-pale);
  border-color: #e8b0b0;
  color: var(--accent);
}
.deadline-card.yellow {
  background: var(--warn-light);
  border-color: #f0d080;
  color: var(--warn);
}
.deadline-card.green {
  background: var(--ok-light);
  border-color: #a8d5b5;
  color: var(--ok);
}
.deadline-card.none {
  background: var(--warm);
  border-color: var(--line);
  color: #666;
}
.deadline-dot {
  width: 14px; height: 14px;
  border-radius: 50%;
  flex-shrink: 0;
}
.deadline-card.red .deadline-dot { background: var(--accent); box-shadow: 0 0 0 4px rgba(139,26,26,.15); }
.deadline-card.yellow .deadline-dot { background: #e6a817; box-shadow: 0 0 0 4px rgba(230,168,23,.15); }
.deadline-card.green .deadline-dot { background: var(--ok); box-shadow: 0 0 0 4px rgba(26,92,46,.15); }
.deadline-card.none .deadline-dot { background: var(--line); }
.deadline-info { flex: 1; }
.deadline-milestone { font-size: .88rem; font-weight: 600; }
.deadline-dates { font-size: .78rem; margin-top: .2rem; opacity: .8; }
.deadline-days {
  font-family: 'Noto Serif TC', serif;
  font-size: 1.6rem;
  font-weight: 700;
  line-height: 1;
  white-space: nowrap;
}

/* ── 區塊卡片 ── */
.section-card {
  background: #fff;
  border: 1px solid var(--line);
  border-radius: 6px;
  overflow: hidden;
  margin-bottom: 1rem;
}
.section-head {
  padding: .75rem 1.25rem;
  background: var(--warm);
  border-bottom: 1px solid var(--line);
  display: flex;
  align-items: center;
  gap: .5rem;
  font-weight: 600;
  font-size: .9rem;
}
.section-body { padding: 1rem 1.25rem; }

/* ── 法規說明 ── */
.law-note {
  background: var(--info-light);
  border-left: 3px solid var(--info);
  padding: .6rem .9rem;
  font-size: .8rem;
  color: var(--info);
  line-height: 1.7;
  border-radius: 0 4px 4px 0;
  margin-bottom: .75rem;
}

/* ── 警告提示 ── */
.warning-note {
  background: var(--accent-pale);
  border-left: 3px solid var(--accent);
  padding: .6rem .9rem;
  font-size: .8rem;
  color: var(--accent);
  line-height: 1.7;
  border-radius: 0 4px 4px 0;
  margin-bottom: .75rem;
}

/* ── 檢核清單 ── */
.checklist { display: flex; flex-direction: column; gap: .5rem; }
.check-item {
  display: flex;
  align-items: flex-start;
  gap: .75rem;
  padding: .5rem .75rem;
  border-radius: 4px;
  border: 1px solid var(--line);
  cursor: pointer;
  transition: background .12s;
  font-size: .88rem;
  line-height: 1.6;
}
.check-item:hover { background: var(--paper); }
.check-item.checked {
  background: var(--ok-light);
  border-color: #a8d5b5;
}
.check-item input[type="checkbox"] {
  width: 16px; height: 16px;
  accent-color: var(--ok);
  flex-shrink: 0;
  margin-top: 3px;
}
.check-item.required-check { border-color: #e8b0b0; }
.check-item.required-check.checked { background: var(--ok-light); border-color: #a8d5b5; }

/* ── 時間輸入 ── */
.time-input-row {
  display: flex;
  gap: 1rem;
  flex-wrap: wrap;
  margin-bottom: .75rem;
}
.time-field { display: flex; flex-direction: column; gap: .25rem; }
.time-field label { font-size: .78rem; color: #666; }
.time-field input {
  padding: .4rem .6rem;
  border: 1px solid var(--line);
  border-radius: 4px;
  font-family: 'Noto Sans TC', sans-serif;
  font-size: .85rem;
  outline: none;
}
.time-field input:focus { border-color: var(--ink); }
.time-status {
  font-size: .82rem;
  font-weight: 600;
  padding: .35rem .75rem;
  border-radius: 4px;
  align-self: flex-end;
  margin-bottom: 2px;
}
.time-status.ok { background: var(--ok-light); color: var(--ok); }
.time-status.warn { background: var(--warn-light); color: var(--warn); }
.time-status.error { background: var(--accent-pale); color: var(--accent); }

/* ── 表單下載區 ── */
.download-list { display: flex; flex-direction: column; gap: .4rem; }
.download-item {
  display: flex;
  align-items: center;
  gap: .5rem;
  padding: .45rem .75rem;
  border: 1px solid var(--line);
  border-radius: 4px;
  font-size: .85rem;
  color: var(--info);
  text-decoration: none;
  transition: background .12s;
}
.download-item:hover { background: var(--info-light); }
.download-item span { flex: 1; }

/* ── 分流選擇 ── */
.branch-options { display: flex; flex-direction: column; gap: .5rem; }
.branch-option {
  display: flex;
  align-items: flex-start;
  gap: .75rem;
  padding: .75rem 1rem;
  border: 1.5px solid var(--line);
  border-radius: 6px;
  cursor: pointer;
  transition: all .15s;
  font-size: .88rem;
  line-height: 1.6;
}
.branch-option:hover { border-color: var(--ink); background: var(--warm); }
.branch-option.selected { border-color: var(--ok); background: var(--ok-light); }
.branch-option input[type="radio"] {
  width: 16px; height: 16px;
  accent-color: var(--ok);
  flex-shrink: 0;
  margin-top: 3px;
}
.branch-label { font-weight: 600; }
.branch-desc { font-size: .78rem; color: #666; margin-top: .15rem; }

/* ── 人數驗證 ── */
.number-input-row {
  display: flex;
  align-items: center;
  gap: .75rem;
  flex-wrap: wrap;
}
.number-field { display: flex; flex-direction: column; gap: .25rem; }
.number-field label { font-size: .78rem; color: #666; }
.number-field input {
  width: 80px;
  padding: .4rem .6rem;
  border: 1px solid var(--line);
  border-radius: 4px;
  font-family: 'Noto Sans TC', sans-serif;
  font-size: .85rem;
  text-align: center;
  outline: none;
}
.number-field input:focus { border-color: var(--ink); }
.number-result {
  font-size: .82rem;
  padding: .35rem .75rem;
  border-radius: 4px;
  margin-top: 18px;
}
.number-result.ok { background: var(--ok-light); color: var(--ok); }
.number-result.fail { background: var(--accent-pale); color: var(--accent); }

/* ── 推進按鈕區 ── */
.advance-area {
  margin-top: 1.5rem;
  padding-top: 1.5rem;
  border-top: 1px solid var(--line);
}
.advance-btn {
  display: block;
  width: 100%;
  padding: .85rem 1.5rem;
  background: var(--ink);
  color: #fff;
  border: none;
  border-radius: 6px;
  font-family: 'Noto Serif TC', serif;
  font-size: 1rem;
  font-weight: 600;
  cursor: pointer;
  transition: opacity .15s;
  text-align: center;
}
.advance-btn:hover { opacity: .88; }
.advance-btn:disabled { opacity: .35; cursor: not-allowed; }
.advance-hint {
  font-size: .78rem;
  color: #aaa;
  text-align: center;
  margin-top: .5rem;
}

/* ── 載入中 Toast ── */
#loadingToast {
  position: fixed;
  bottom: 2rem;
  left: 50%;
  transform: translateX(-50%);
  background: var(--ink);
  color: #fff;
  padding: .75rem 1.5rem;
  border-radius: 40px;
  font-size: .88rem;
  display: none;
  align-items: center;
  gap: .75rem;
  box-shadow: 0 4px 20px rgba(0,0,0,.35);
  z-index: 9999;
}
</style>
</head>
<body>

<!-- 頂部 -->
<header class="top-bar">
  <div class="top-bar-left">
    <button class="back-btn" onclick="goBack()">← 返回儀表板</button>
    <h1>🏫 霸凌事件處理流程</h1>
    <div class="case-info-bar" id="caseInfoBar"></div>
  </div>
</header>

<!-- 主體 -->
<main class="main" id="mainContent">
  <div class="loading-state">
    <div class="spinner"></div>
    <p>載入案件資料中...</p>
  </div>
</main>

<!-- Toast -->
<div id="loadingToast">
  <span style="display:inline-block;width:16px;height:16px;border:2px solid rgba(255,255,255,.3);border-top-color:#fff;border-radius:50%;animation:spin .7s linear infinite;flex-shrink:0;"></span>
  <span id="toastMsg">處理中...</span>
</div>

<script>
const GAS_URL = 'https://script.google.com/macros/s/AKfycbwXSckDnFFrjbr-IPdRmnJAcebfmg_gP1n5r2TLC3IEmNIrdGRBuaql4GAuDSnW8LP7dw/exec';

// ── 狀態
let caseData = null;
let deadlines = [];
let currentEmail = '';
let currentCaseId = '';

// ── 工具函式
function getUrlParam(name) {
  return new URLSearchParams(window.location.search).get(name);
}

function goBack() {
  window.location.href = './dashboard.html';
}

async function callGAS(action, data = {}) {
  const body = JSON.stringify({ action, email: currentEmail, ...data });
  const res = await fetch(GAS_URL, {
    method: 'POST',
    headers: { 'Content-Type': 'text/plain' },
    body
  });
  return await res.json();
}

function showToast(msg) {
  document.getElementById('toastMsg').textContent = msg;
  document.getElementById('loadingToast').style.display = 'flex';
}
function hideToast() {
  document.getElementById('loadingToast').style.display = 'none';
}

function formatDate(dateStr) {
  if (!dateStr) return '—';
  // 處理 ISO 格式（含時區）
  const d = new Date(dateStr);
  if (!isNaN(d.getTime())) {
    return `${d.getFullYear()}/${String(d.getMonth()+1).padStart(2,'0')}/${String(d.getDate()).padStart(2,'0')}`;
  }
  return dateStr.replace(/-/g, '/');
}

function getLightClass(light) {
  return light || 'none';
}

// ── 載入案件
async function init() {
  currentCaseId = getUrlParam('case_id');
  currentEmail = getUrlParam('email');

  if (!currentCaseId || !currentEmail) {
    document.getElementById('mainContent').innerHTML = `
      <div class="loading-state">
        <p style="color:var(--accent);">❌ 找不到案件資訊，請從儀表板進入。</p>
        <button onclick="goBack()" style="margin-top:1rem;padding:.5rem 1rem;background:var(--ink);color:#fff;border:none;border-radius:4px;cursor:pointer;">返回儀表板</button>
      </div>`;
    return;
  }

  try {
    const [caseResult, dlResult] = await Promise.all([
      callGAS('bully_load', { case_id: currentCaseId }),
      callGAS('bully_deadline_list', { case_id: currentCaseId })
    ]);

    if (!caseResult.ok) throw new Error(caseResult.error);

    caseData = caseResult.case;
    deadlines = dlResult.deadlines || [];

    // 頂部案件資訊
    document.getElementById('caseInfoBar').textContent =
      `📋 ${caseData.case_name}　🏫 ${caseData.school || ''}`;

    // 渲染對應階段
    renderStage(caseData.stage);

  } catch(e) {
    document.getElementById('mainContent').innerHTML = `
      <div class="loading-state">
        <p style="color:var(--accent);">載入失敗：${e.message}</p>
      </div>`;
  }
}

// ── 渲染對應階段
function renderStage(stage) {
  const renders = {
    'STAGE_01': renderStage01,
    'STAGE_02': renderStage02,
    'STAGE_03': renderStage03,
    'STAGE_04': renderStage04,
    'STAGE_05A': renderStage05A,
    'STAGE_05B': renderStage05B,
    'STAGE_06': renderStage06,
    'STAGE_07': renderStage07,
    'PRE_STAGE': renderPreStage,
  };
  const fn = renders[stage];
  if (fn) {
    fn();
  } else {
    document.getElementById('mainContent').innerHTML = `
      <div class="loading-state">
        <p>階段「${stage}」的流程介面尚在建置中。</p>
      </div>`;
  }
}

// ── 期限卡片 HTML
function deadlineCardHtml() {
  if (!deadlines.length) return '';
  // 找最近的截止日
  const sorted = [...deadlines].sort((a,b) => new Date(a.due_date) - new Date(b.due_date));
  const dl = sorted[0];
  const light = dl.light || 'none';
  const daysText = dl.days_left < 0
    ? `逾期 ${Math.abs(dl.days_left)} 天`
    : `剩 ${dl.days_left} 天`;

  return `
  <div class="deadline-card ${light}">
    <div class="deadline-dot"></div>
    <div class="deadline-info">
      <div class="deadline-milestone">⏱ ${dl.milestone}</div>
      <div class="deadline-dates">截止日：${formatDate(dl.due_date)}</div>
    </div>
    <div class="deadline-days">${daysText}</div>
  </div>`;
}

// ══════════════════════════════
// PRE_STAGE 通報列管中
// ══════════════════════════════
function renderPreStage() {
  document.getElementById('mainContent').innerHTML = `
    ${deadlineCardHtml()}

    <div class="section-card">
      <div class="section-head">📋 通報列管中</div>
      <div class="section-body">
        <div class="law-note">
          依第17條，學校知悉疑似霸凌事件後，不論是否有人提出檢舉，均應於<strong>24小時內</strong>完成校安通報。<br>
          通報完成後若尚未接獲檢舉，案件進入「通報列管」狀態，20工作日的審查時鐘尚未開始。
        </div>
        <p style="font-size:.88rem;color:#666;line-height:1.7;margin-bottom:1.2rem;">
          目前案件處於通報列管狀態。若後續家長或相關人員提出正式檢舉，請點擊下方按鈕重啟案件流程。
        </p>
        <button onclick="resumeToStage01()" style="padding:.7rem 1.2rem;background:var(--ok);color:#fff;border:none;border-radius:6px;font-size:.9rem;font-weight:600;cursor:pointer;font-family:'Noto Sans TC',sans-serif;width:100%;text-align:center;">
          📨 已接獲正式檢舉，重啟 STAGE_01 流程
        </button>
      </div>
    </div>

    <div class="section-card">
      <div class="section-head">📥 相關表單</div>
      <div class="section-body">
        <div class="download-list">
          <a class="download-item" href="http://163.30.64.12/modules/tad_uploader/index.php?of_cat_sn=14" target="_blank">
            <span>📄 桃園市公版表單下載（教師專審會）</span>→
          </a>
        </div>
      </div>
    </div>
  `;
}

// ══════════════════════════════
// STAGE_01 知悉受理
// ══════════════════════════════
function renderStage01() {
  document.getElementById('mainContent').innerHTML = `
    ${deadlineCardHtml()}

    <!-- 法規說明 -->
    <div class="section-card">
      <div class="section-head">📋 STAGE 01｜知悉受理</div>
      <div class="section-body">
        <div class="law-note">
          <strong>第17條：</strong>學校知悉疑似霸凌事件，應於<strong>24小時內</strong>向主管機關通報。<br>
          <strong>第23條：</strong>知悉後應先行保全相關證據及資料。<br>
          <strong>第18條：</strong>接獲檢舉後，20工作日審查時鐘才正式啟動。
        </div>
      </div>
    </div>

    <!-- 校安通報確認 -->
    <div class="section-card">
      <div class="section-head">🔔 校安通報確認（第17條）</div>
      <div class="section-body">
        <div class="time-input-row">
          <div class="time-field">
            <label>知悉日期時間 *</label>
            <input type="datetime-local" id="timeKnown" onchange="checkTimeStatus()">
          </div>
          <div class="time-field">
            <label>完成通報時間 *</label>
            <input type="datetime-local" id="timeReported" onchange="checkTimeStatus()">
          </div>
          <button onclick="confirmTimeInput()" style="padding:.4rem .9rem;background:var(--ink);color:#fff;border:none;border-radius:4px;font-size:.78rem;cursor:pointer;font-family:'Noto Sans TC',sans-serif;align-self:flex-end;margin-bottom:2px;">
            確認時間
          </button>
          <div class="time-status" id="timeStatus"></div>
        </div>
        <div id="timeConfirmed" style="display:none;font-size:.8rem;color:var(--ok);margin-bottom:.5rem;">✅ 通報時間已確認記錄</div>
        <div class="time-field" style="margin-bottom:.75rem;">
          <label>校安通報序號</label>
          <input type="text" id="reportNo" placeholder="請輸入校安通報序號" style="width:200px;">
        </div>
        <div class="checklist">
          <label class="check-item required-check" onclick="toggleCheck(this, event)">
            <input type="checkbox" id="cbReport">
            <span>已完成校安通報（含主管機關與社政機關）</span>
          </label>
        </div>
      </div>
    </div>

    <!-- 管轄權確認 -->
    <div class="section-card">
      <div class="section-head">⚖️ 案件管轄權確認（第19、20條）</div>
      <div class="section-body">
        <div class="branch-options" id="jurisdictionOptions">
          <label class="branch-option" onclick="selectBranch('jurisdiction', 'local', this)">
            <input type="radio" name="jurisdiction" value="local" onchange="checkAdvanceReady()">
            <div>
              <div class="branch-label">本校案件</div>
              <div class="branch-desc">雙方當事人均為本校在籍學生</div>
            </div>
          </label>
          <label class="branch-option" onclick="selectBranch('jurisdiction', 'cross', this)">
            <input type="radio" name="jurisdiction" value="cross" onchange="checkAdvanceReady()">
            <div>
              <div class="branch-label">跨校案件</div>
              <div class="branch-desc">依第20條，由先接獲檢舉學校調查；STAGE_06 須通知行為人所屬學校派員列席</div>
            </div>
          </label>
          <label class="branch-option" onclick="selectBranch('jurisdiction', 'none', this)">
            <input type="radio" name="jurisdiction" value="none" onchange="checkAdvanceReady()">
            <div>
              <div class="branch-label">不具管轄權</div>
              <div class="branch-desc">依第19條，應於3工作日內移送調查學校</div>
            </div>
          </label>
        </div>
        <div id="jurisdictionNoneWarn" style="display:none;margin-top:.75rem;">

function toggleCheck(el, event) {
  // 避免 label 和 checkbox 雙重觸發
  if (event && event.target.tagName === 'INPUT') {
    el.classList.toggle('checked', event.target.checked);
  } else if (!event) {
    const cb = el.querySelector('input[type="checkbox"]');
    if (cb) {
      cb.checked = !cb.checked;
      el.classList.toggle('checked', cb.checked);
    }
  }
  if (typeof checkAdvanceReady === 'function') checkAdvanceReady();
  if (typeof checkAdvanceReady02 === 'function') checkAdvanceReady02();
  if (typeof checkAdvanceReady03 === 'function') checkAdvanceReady03();
  if (typeof checkAdvanceReady04 === 'function') checkAdvanceReady04();
  if (typeof checkAdvanceReady05A === 'function') checkAdvanceReady05A();
  if (typeof checkAdvanceReady05B === 'function') checkAdvanceReady05B();
  if (typeof checkAdvanceReady06 === 'function') checkAdvanceReady06();
}

function selectBranch(name, value, el) {
  // 1. 切換外觀與選取狀態
  document.querySelectorAll(`input[name="${name}"]`).forEach(r => {
    r.closest('.branch-option')?.classList.remove('selected');
  });
  el.classList.add('selected');
  const radio = el.querySelector('input[type="radio"]');
  if (radio) radio.checked = true;

  // 2. 關鍵修復：手動喚醒卡片連動與防呆機制 (之前被覆蓋掉的就在這裡 👇)
  if (name === 'jurisdiction' && typeof checkEvidenceDone === 'function') {
    checkEvidenceDone(); // 如果切換的是管轄權，強制更新不具管轄權卡片
  }
  
  // 3. 喚醒所有階段的推進按鈕檢查
  if (typeof checkAdvanceReady === 'function') checkAdvanceReady();
  if (typeof checkAdvanceReady02 === 'function') checkAdvanceReady02();
  if (typeof checkAdvanceReady03 === 'function') checkAdvanceReady03(); // 補上03
  if (typeof checkAdvanceReady04 === 'function') checkAdvanceReady04();
  if (typeof checkAdvanceReady05A === 'function') checkAdvanceReady05A();
  if (typeof checkAdvanceReady05B === 'function') checkAdvanceReady05B();
  if (typeof checkAdvanceReady06 === 'function') checkAdvanceReady06();
  if (typeof checkAdvanceReady07 === 'function') checkAdvanceReady07();
}

function confirmTimeInput() {
  const tKnown = document.getElementById('timeKnown')?.value;
  const tReported = document.getElementById('timeReported')?.value;
  if (!tKnown || !tReported) { alert('請先填寫知悉時間和通報時間'); return; }
  checkTimeStatus();
  const confirmed = document.getElementById('timeConfirmed');
  if (confirmed) confirmed.style.display = 'block';
}

function checkTimeStatus() {
  const tKnown = document.getElementById('timeKnown')?.value;
  const tReported = document.getElementById('timeReported')?.value;
  const statusEl = document.getElementById('timeStatus');
  if (!statusEl) return;

  if (!tKnown || !tReported) { statusEl.textContent = ''; statusEl.className = 'time-status'; return; }

  const diff = (new Date(tReported) - new Date(tKnown)) / 3600000;
  if (diff < 0) {
    statusEl.textContent = '❌ 時間邏輯錯誤';
    statusEl.className = 'time-status error';
  } else if (diff > 24) {
    statusEl.textContent = `⚠️ 逾時 ${Math.floor(diff)} 小時`;
    statusEl.className = 'time-status warn';
  } else {
    statusEl.textContent = `✅ 符合24小時`;
    statusEl.className = 'time-status ok';
  }
  checkAdvanceReady();
}

function checkAdvanceReady() {
  const btn = document.getElementById('advanceBtn');
  const hint = document.getElementById('advanceHint');
  if (!btn) return;

  const cbReport = document.getElementById('cbReport')?.checked;
  const jurisdiction = document.querySelector('input[name="jurisdiction"]:checked')?.value;
  const evChecked = ['cbEv1','cbEv2','cbEv3','cbEv4','cbEvNA'].some(id => document.getElementById(id)?.checked);
  const complainDate = document.getElementById('complainDate')?.value;
  const complain = document.querySelector('input[name="complain"]:checked')?.value;

  // 不具管轄權時顯示警告
  const noneWarn = document.getElementById('jurisdictionNoneWarn');
  if (noneWarn) noneWarn.style.display = jurisdiction === 'none' ? 'block' : 'none';

  // 切換管轄權時重新觸發保全證據判斷
  const evChecked2 = ['cbEv1','cbEv2','cbEv3','cbEv4','cbEvNA'].some(id => document.getElementById(id)?.checked);

  const noneStepsCard = document.getElementById('noneStepsCard');
  if (noneStepsCard) {
    noneStepsCard.style.display = (evChecked2 && jurisdiction === 'none') ? 'block' : 'none';
    if (evChecked2 && jurisdiction === 'none') showNoneDeadline();
  }

  const branchCard = document.getElementById('complainBranchCard');

  const today = new Date();

    if (d.getDay() !== 0 && d.getDay() !== 6) count++;
  }

function updateMemberRows() {
  const count = parseInt(document.getElementById('memberCount')?.value || '3');
  const container = document.getElementById('memberRows');
  if (!container) return;

  container.innerHTML = Array.from({length: count}, (_, i) => `
    <div style="display:flex;gap:.5rem;align-items:center;flex-wrap:wrap;">
      <span style="font-size:.78rem;color:#888;min-width:2em;">委員${i+1}</span>
      <input type="text" id="memberName_${i}" placeholder="委員姓名"
        oninput="checkAdvanceReady03()"
        style="flex:1;min-width:120px;padding:.4rem .6rem;border:1px solid var(--line);border-radius:4px;font-family:'Noto Sans TC',sans-serif;font-size:.85rem;outline:none;">
      <select id="memberType_${i}" onchange="calculateProportion(); checkAdvanceReady03()"
        style="padding:.4rem .6rem;border:1px solid var(--line);border-radius:4px;font-family:'Noto Sans TC',sans-serif;font-size:.85rem;outline:none;">
        <option value="external">外聘（人才庫）</option>
        <option value="internal">內聘</option>
      </select>
    </div>
  `).join('');

  // 預設3人時外聘2、內聘1；5人時外聘3、內聘2
  const defaults = count === 3 ? ['external','external','internal'] : ['external','external','external','internal','internal'];
  defaults.forEach((type, i) => {
    const el = document.getElementById('memberType_' + i);
    if (el) el.value = type;
  });

  calculateProportion();
  checkAdvanceReady03();
}

function calculateProportion() {
  const count = parseInt(document.getElementById('memberCount')?.value || '3');
  let externalCount = 0;
  for (let i = 0; i < count; i++) {
    const type = document.getElementById('memberType_' + i)?.value;
    if (type === 'external') externalCount++;
  }

  const required = Math.floor(count / 2) + 1; // 過半數
  const passed = externalCount >= required;
  const resultEl = document.getElementById('proportionResult');
  if (resultEl) {
    resultEl.textContent = passed
      ? `✅ 外聘 ${externalCount}/${count} 人，比例達標`
      : `❌ 外聘 ${externalCount}/${count} 人，需至少 ${required} 位外聘`;
    resultEl.style.background = passed ? 'var(--ok-light)' : 'var(--accent-pale)';
    resultEl.style.color = passed ? 'var(--ok)' : 'var(--accent)';
  }
  return passed;
}

function checkAdvanceReady03() {
  const btn = document.getElementById('advanceBtn03');
  const hint = document.getElementById('advanceHint03');
  if (!btn) return;

  const count = parseInt(document.getElementById('memberCount')?.value || '3');

  // 所有姓名填寫
  const allNamesFilled = Array.from({length: count}, (_, i) =>
    (document.getElementById('memberName_' + i)?.value || '').trim() !== ''
  ).every(Boolean);

  // 外聘比例達標
  const proportionPassed = calculateProportion();

  // 三項迴避勾選
  const avoidChecked = ['cbAvoid1','cbAvoid2','cbAvoid3'].every(id => document.getElementById(id)?.checked);

  const ready = allNamesFilled && proportionPassed && avoidChecked;
  btn.disabled = !ready;
  if (ready) {
    btn.textContent = '✅ 確認組成完成，推進至 STAGE_04 會前會 →';
    if (hint) hint.textContent = '';
  } else {
    btn.textContent = '請先完成上方所有項目';
    if (hint) {
      const missing = [];
      if (!allNamesFilled) missing.push('委員姓名未填寫完整');
      if (!proportionPassed) missing.push('外聘比例未達標');
      if (!avoidChecked) missing.push('迴避確認未完成');
      hint.textContent = missing.join('、');
    }
  }
}

function checkAdvanceReady04() {
  const btn = document.getElementById('advanceBtn04');
  const hint = document.getElementById('advanceHint04');
  if (!btn) return;

  const preMeetingDate = document.getElementById('preMeetingDate')?.value;
  const cbPre1 = document.getElementById('cbPreMeeting1')?.checked;
  const cbPre2 = document.getElementById('cbPreMeeting2')?.checked;
  const cbPre3 = document.getElementById('cbPreMeeting3')?.checked;
  const track = document.querySelector('input[name="track"]:checked')?.value;

  // 調和時需額外確認
  let extraReady = true;
  const reconciliationExtra = document.getElementById('reconciliationExtra');
  if (track === 'reconciliation') {
    reconciliationExtra.style.display = 'block';
    extraReady = document.getElementById('cbReconciliation1')?.checked &&
                 document.getElementById('cbReconciliation2')?.checked;
  } else if (track === 'investigation') {
    if (reconciliationExtra) reconciliationExtra.style.display = 'none';
  }

  const ready = preMeetingDate && cbPre1 && cbPre2 && cbPre3 && track && extraReady;
  btn.disabled = !ready;

  if (ready) {
    if (track === 'reconciliation') {
      btn.textContent = '🤝 確認進入調和程序，推進至 STAGE_05A →';
    } else {
      btn.textContent = '🔍 確認進入調查程序，推進至 STAGE_05B →';
    }
    if (hint) hint.textContent = '';
  } else {
    btn.textContent = '請先完成上方所有項目';
    const missing = [];
    if (!preMeetingDate) missing.push('會前會日期');
    if (!cbPre1 || !cbPre2 || !cbPre3) missing.push('會前會檢核');
    if (!track) missing.push('程序走向選擇');
    if (track === 'reconciliation' && !extraReady) missing.push('調和額外確認');
    if (hint) hint.textContent = missing.join('、') + ' 尚未完成';
  }
}

async function advanceStage04() {
  const track = document.querySelector('input[name="track"]:checked')?.value;
  const preMeetingDate = document.getElementById('preMeetingDate')?.value;
  const nextStage = track === 'reconciliation' ? 'STAGE_05A' : 'STAGE_05B';
  const nextLabel = track === 'reconciliation' ? '05A 調和程序' : '05B 調查程序';
  const milestone = track === 'reconciliation'
    ? '第一次調和會議召開(換入調和)'
    : '第一次調查會議召開(換入調查)';

  showToast(`正在推進至${nextLabel}...`);
  try {
    const result = await callGAS('bully_advance_stage', {
      case_id: currentCaseId,
      email: currentEmail,
      milestone,
      done_date: preMeetingDate,
      stage: nextStage,
      data_json: JSON.stringify({
        ...JSON.parse(caseData.data_json || '{}'),
        pre_meeting_date: preMeetingDate,
        track_decision: track,
        first_meeting_date: preMeetingDate  // 共用時鐘起算點
      })
    });
    if (!result.ok) throw new Error(result.error);
    const dlResult = await callGAS('bully_deadline_list', { case_id: currentCaseId });
    deadlines = dlResult.deadlines || [];
    caseData.stage = nextStage;
    hideToast();
    alert(`✅ 已推進至「${nextLabel}」\n期限已自動計算。`);
    renderStage(nextStage);
  } catch(e) {
    hideToast();
    alert('推進失敗：' + e.message);
  }
}

function validateCommittee() {
  const total = parseInt(document.getElementById('totalMembers')?.value || '0');
  const attend = parseInt(document.getElementById('attendMembers')?.value || '0');
  const agree = parseInt(document.getElementById('agreeMembers')?.value || '0');
  const resultEl = document.getElementById('committeeValidResult');
  if (!resultEl || !total || !attend || !agree) {
    if (resultEl) resultEl.style.display = 'none';
    checkAdvanceReady06();
    return;
  }

  const quorum = Math.ceil(total / 2);       // 出席門檻：過半
  const majority = Math.ceil(attend / 2);    // 決議門檻：出席過半

  const quorumOk = attend >= quorum;
  const majorityOk = agree >= majority;
  const logicOk = attend <= total && agree <= attend;

  resultEl.style.display = 'block';
  if (!logicOk) {
    resultEl.textContent = '❌ 人數邏輯錯誤（出席不得超過總數，同意不得超過出席）';
    resultEl.style.background = 'var(--accent-pale)';
    resultEl.style.color = 'var(--accent)';
  } else if (!quorumOk) {
    resultEl.textContent = `❌ 出席不足（${attend}/${total}，需至少 ${quorum} 人出席）`;
    resultEl.style.background = 'var(--accent-pale)';
    resultEl.style.color = 'var(--accent)';
  } else if (!majorityOk) {
    resultEl.textContent = `❌ 決議未達門檻（同意 ${agree}/${attend}，需至少 ${majority} 人同意）`;
    resultEl.style.background = 'var(--accent-pale)';
    resultEl.style.color = 'var(--accent)';
  } else {
    resultEl.textContent = `✅ 出席合法（${attend}/${total}），決議有效（同意 ${agree}/${attend}）`;
    resultEl.style.background = 'var(--ok-light)';
    resultEl.style.color = 'var(--ok)';
  }
  checkAdvanceReady06();
}

function checkAdvanceReady06() {
  const btn = document.getElementById('advanceBtn06');
  const hint = document.getElementById('advanceHint06');
  if (!btn) return;

  const meetingDate = document.getElementById('committeeMeetingDate')?.value;

  // 人數驗證
  const total = parseInt(document.getElementById('totalMembers')?.value || '0');
  const attend = parseInt(document.getElementById('attendMembers')?.value || '0');
  const agree = parseInt(document.getElementById('agreeMembers')?.value || '0');
  const quorum = Math.ceil(total / 2);
  const majority = Math.ceil(attend / 2);
  const committeeValid = total > 0 && attend >= quorum && agree >= majority && attend <= total && agree <= attend;

  // 程序確認（跨校二擇一）
  const cbComm1 = document.getElementById('cbComm1')?.checked;
  const cbComm2 = document.getElementById('cbComm2')?.checked;
  const cbComm2NA = document.getElementById('cbComm2NA')?.checked;
  const cbComm3 = document.getElementById('cbComm3')?.checked;
  const crossSchoolOk = cbComm2 || cbComm2NA;

  // 決議選擇
  const decision = document.querySelector('input[name="committeeDecision"]:checked')?.value;
  const returnDetail = document.getElementById('returnDetail');
  if (returnDetail) returnDetail.style.display = decision === 'return' ? 'block' : 'none';

  let decisionReady = !!decision;
  if (decision === 'return') {
    decisionReady = document.getElementById('cbReturn1')?.checked &&
                    document.getElementById('cbReturn2')?.checked;
  }

  const ready = meetingDate && committeeValid && cbComm1 && crossSchoolOk && cbComm3 && decisionReady;
  btn.disabled = !ready;

  if (ready) {
    btn.textContent = decision === 'approve'
      ? '✅ 確認通過，進入 STAGE_07 後續處理 →'
      : '🚨 確認退回，重啟 STAGE_05B 調查程序 →';
    if (hint) hint.textContent = '';
  } else {
    btn.textContent = '請先完成上方所有項目';
    const missing = [];
    if (!committeeValid) missing.push('委員會門檻驗證');
    if (!meetingDate) missing.push('審議日期');
    if (!cbComm1) missing.push('迴避確認');
    if (!crossSchoolOk) missing.push('跨校通知確認');
    if (!cbComm3) missing.push('會議紀錄確認');
    if (!decisionReady) missing.push(decision === 'return' ? '退回確認項目' : '審議結果');
    if (hint) hint.textContent = missing.join('、') + ' 尚未完成';
  }
}

async function advanceStage06() {
  const decision = document.querySelector('input[name="committeeDecision"]:checked')?.value;

  const milestone = decision === 'approve' ? '防制委員會議通過' : '退回重新調查';

if (decision === 'return') {
    const confirmed = confirm('🚨 確認退回重新調查？\n\n退回後系統將重回 STAGE_05B，期限依實際重啟日期重新計算。');
    if (!confirmed) return;

  showToast(`正在推進至${nextLabel}...`);
  try {
    const saved = JSON.parse(caseData.data_json || '{}');
    const res = await callGAS('bully_advance_stage', {
      case_id: currentCaseId,
      email: currentEmail,
      milestone,
      done_date: meetingDate,

        ...saved,

        committee_decision: decision,
        committee_total: total,
        committee_attend: attend,
        committee_agree: agree

}

          <strong>第46條第2項：</strong>學校應於作成終局實體處理後 <strong>10個工作日內</strong> 以書面通知雙方當事人及其法定代理人。<br>
          <strong>第49條：</strong>被行為人或行為人於收受通知之次日起 <strong>30日內</strong> 得向學校提出申復，同一事件以一次為限。
        </div>
      </div>
    </div>

    <!-- 終局處理確認 -->
    <div class="section-card">
      <div class="section-head">📝 終局實體處理（第46條第1項）</div>
      <div class="section-body">
        <div class="time-field" style="margin-bottom:.75rem;">
          <label>終局實體處理日期（校長核定日）*</label>
          <input type="date" id="finalDecisionDate" onchange="checkAdvanceReady07()" style="width:200px;">
        </div>
        <div class="checklist">
          <label class="check-item required-check" onclick="toggleCheck(this, event)">
            <input type="checkbox" id="cbFinal1">
            <span>終局處理決議已記載於防制委員會會議紀錄，並經校長核定</span>
          </label>
          <label class="check-item required-check" onclick="toggleCheck(this, event)">
            <input type="checkbox" id="cbFinal2">
            <span>懲處與輔導措施已依決議內容確認執行單位及期程</span>
          </label>
        </div>
        <div class="download-list" style="margin-top:.75rem;">
          <a class="download-item" href="http://163.30.64.12/modules/tad_uploader/index.php?of_cat_sn=14" target="_blank">
            <span>6-3 被行為人結果通知函（公版範本）</span>→
          </a>
          <a class="download-item" href="http://163.30.64.12/modules/tad_uploader/index.php?of_cat_sn=14" target="_blank">
            <span>6-4 行為人結果通知函（公版範本）</span>→
          </a>
        </div>
      </div>
    </div>

    <!-- 書面通知送達 -->
    <div class="section-card">
      <div class="section-head">✉️ 書面通知送達（第46條第2項）</div>
      <div class="section-body">
        <div class="time-field" style="margin-bottom:.75rem;">
          <label>書面通知送達日期（發文送達日）*</label>
          <input type="date" id="noticeDeliveredDate" onchange="checkAdvanceReady07()" style="width:200px;">
        </div>
        <div class="warning-note">
          ⚠️ 送達日期是申復期限（30日）的起算點，請務必正確記錄。
        </div>
        <div class="checklist" style="margin-top:.75rem;">
          <label class="check-item required-check" onclick="toggleCheck(this, event)">
            <input type="checkbox" id="cbNotice1">
            <span>已以書面分別通知<strong>被行為人及行為人</strong>（含法定代理人）</span>
          </label>
          <label class="check-item required-check" onclick="toggleCheck(this, event)">
            <input type="checkbox" id="cbNotice2">
            <span><strong>書面通知內已載明：</strong>收受通知次日起 <strong>30 日內</strong> 得向學校提出申復，同一事件以一次為限（第49條）</span>
          </label>
          <label class="check-item required-check" onclick="toggleCheck(this, event)">
            <input type="checkbox" id="cbNotice3">
            <span>送達證書（3-8）已完成並留存，作為送達日期之佐證</span>
          </label>
        </div>
        <div class="download-list" style="margin-top:.75rem;">
          <a class="download-item" href="http://163.30.64.12/modules/tad_uploader/index.php?of_cat_sn=14" target="_blank">
            <span>3-8 送達證書（公版範本）</span>→
          </a>
        </div>
      </div>
    </div>

    <!-- 推進 -->
    <div class="advance-area">
      <button class="advance-btn" id="advanceBtn07" disabled onclick="advanceStage07()">
        請先完成上方所有項目
      </button>
      <p class="advance-hint" id="advanceHint07">請填寫兩個日期並完成所有確認項目</p>
    </div>
  `;

  // 回填已儲存資料
  try {
    const saved = JSON.parse(caseData.data_json || '{}');
    if (saved.final_decision_date) document.getElementById('finalDecisionDate').value = saved.final_decision_date;
    if (saved.notice_delivered_date) document.getElementById('noticeDeliveredDate').value = saved.notice_delivered_date;
    checkAdvanceReady07();
  } catch(e) {}
}

function checkAdvanceReady07() {
  const btn = document.getElementById('advanceBtn07');
  const hint = document.getElementById('advanceHint07');
  if (!btn) return;

  const finalDate = document.getElementById('finalDecisionDate')?.value;
  const noticeDate = document.getElementById('noticeDeliveredDate')?.value;
  const allChecked = ['cbFinal1','cbFinal2','cbNotice1','cbNotice2','cbNotice3']
    .every(id => document.getElementById(id)?.checked);

  const ready = finalDate && noticeDate && allChecked;
  btn.disabled = !ready;

  if (ready) {
    // 計算並顯示申復截止日
    const noticeD = new Date(noticeDate);
    noticeD.setDate(noticeD.getDate() + 31); // 次日起算30日
    const appealDeadline = `${noticeD.getFullYear()}/${String(noticeD.getMonth()+1).padStart(2,'0')}/${String(noticeD.getDate()).padStart(2,'0')}`;
    btn.textContent = `✅ 確認完成，進入 STAGE_08 申復列管（申復截止：${appealDeadline}）→`;
    if (hint) hint.textContent = '';
  } else {
    btn.textContent = '請先完成上方所有項目';
    const missing = [];
    if (!finalDate) missing.push('終局處理日期');
    if (!noticeDate) missing.push('通知送達日期');
    if (!allChecked) missing.push('確認項目未完成');
    if (hint) hint.textContent = missing.join('、');
  }
}

async function advanceStage07() {
  const finalDate = document.getElementById('finalDecisionDate')?.value;
  const noticeDate = document.getElementById('noticeDeliveredDate')?.value;

  // 計算申復截止日（次日起算30日）
  const noticeD = new Date(noticeDate);
  noticeD.setDate(noticeD.getDate() + 31);
  const appealDeadline = noticeD.toISOString().split('T')[0];

  showToast('正在推進至申復列管階段...');
  try {
    const saved = JSON.parse(caseData.data_json || '{}');
    const res = await callGAS('bully_advance_stage', {
      case_id: currentCaseId,
      email: currentEmail,
      milestone: '作成終局實體處理',
      done_date: finalDate,
      stage: 'STAGE_08',
      data_json: JSON.stringify({
        ...saved,
        final_decision_date: finalDate,
        notice_delivered_date: noticeDate,
        appeal_deadline: appealDeadline
      })
    });
    if (!res.ok) throw new Error(res.error);
    const dlResult = await callGAS('bully_deadline_list', { case_id: currentCaseId });
    deadlines = dlResult.deadlines || [];
    caseData.stage = 'STAGE_08';
    hideToast();
    alert(`✅ 已推進至「08 申復列管」\n申復截止日：${appealDeadline.replace(/-/g,'/')}`);
    renderStage('STAGE_08');
  } catch(e) {
    hideToast();
    alert('推進失敗：' + e.message);
  }
}

// ══════════════════════════════
// STAGE_08 申復列管與輔導追蹤
// ══════════════════════════════
function renderStage08() {
  let appealDeadline = '';
  try {
    const saved = JSON.parse(caseData.data_json || '{}');
    if (saved.appeal_deadline) {
      appealDeadline = saved.appeal_deadline.replace(/-/g, '/');
    }
  } catch(e) {}

  document.getElementById('mainContent').innerHTML = `
    ${deadlineCardHtml()}
    <div class="section-card">
      <div class="section-head">📋 STAGE 08｜申復列管與輔導追蹤</div>
      <div class="section-body">
        <div class="law-note">
          <strong>第49條：</strong>當事人於收受終局實體處理通知之次日起 <strong>30日內</strong> 得向學校提出申復，同一事件以一次為限。<br>
          <strong>第58條：</strong>學校應訂定輔導計畫，持續輔導行為人，並定期評估是否改善。
        </div>
        ${appealDeadline ? `
        <div style="margin-top:.75rem;padding:.75rem;background:var(--warn-light);border-radius:4px;font-size:.88rem;color:var(--warn);">
          ⏱ <strong>申復截止日：${appealDeadline}</strong>（逾期視同放棄申復權利）
        </div>` : ''}
        <p style="color:#888;font-size:.88rem;margin-top:.75rem;">STAGE_08 申復列管與輔導追蹤介面建置中，請從儀表板繼續追蹤。</p>
      </div>
    </div>
    <div class="advance-area">
      <button onclick="goBack()" style="padding:.6rem 1.2rem;background:transparent;border:1px solid var(--line);border-radius:6px;font-family:'Noto Sans TC',sans-serif;cursor:pointer;">← 返回儀表板</button>
    </div>
  `;
}

// ── 重啟通報列管案件
async function resumeToStage01() {
  if (!confirm('確定已接獲正式檢舉，要重啟此案件的處理流程嗎？')) return;
  showToast('正在重啟案件流程...');
  try {
    const result = await callGAS('bully_save', {
      case_id: currentCaseId,
      email: currentEmail,
      stage: 'STAGE_01',
      status: '辦理中'
    });
    if (!result.ok) throw new Error(result.error);
    hideToast();
    
    // 更新本地狀態並重新渲染 STAGE_01
    caseData.stage = 'STAGE_01';
    renderStage01();
  } catch(e) {
    hideToast();
    alert('重啟失敗：' + e.message);
  }
}
  
// ── 啟動
window.onload = init;
</script>
