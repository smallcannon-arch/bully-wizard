<!DOCTYPE html>
<html lang="zh-TW">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>校園霸凌事件處理系統 — 案件儀表板</title>
<script src="https://accounts.google.com/gsi/client" async defer></script>
<style>
@import url('https://fonts.googleapis.com/css2?family=Noto+Serif+TC:wght@400;600;700&family=Noto+Sans+TC:wght@300;400;500&display=swap');

:root {
  --ink: #1a1a2e; --paper: #f5f3ee; --warm: #ede9e0; --line: #c5bfb0;
  --accent: #8b1a1a; --ok: #1a5c2e; --warn: #7a4a00; --info: #1a3a5c;
  --ok-light: #d4edda; --warn-light: #fff3cd; --accent-pale: #fdf0f0;
}
*, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
body { font-family: 'Noto Sans TC', sans-serif; background: var(--paper); color: var(--ink); min-height: 100vh; font-size: 15px; }

/* ── 頂部 ── */
.header { background: var(--ink); color: #fff; padding: 0 1.5rem; height: 56px; display: flex; align-items: center; justify-content: space-between; position: sticky; top: 0; z-index: 100; box-shadow: 0 2px 8px rgba(0,0,0,.3); }
.header h1 { font-family: 'Noto Serif TC', serif; font-size: 1rem; font-weight: 700; }
.header-right { display: flex; align-items: center; gap: 1rem; font-size: .85rem; }
.user-info { color: rgba(255,255,255,.7); }
.btn-logout { background: none; border: 1px solid rgba(255,255,255,.3); color: #fff; padding: .3rem .8rem; border-radius: 20px; cursor: pointer; font-size: .78rem; font-family: 'Noto Sans TC', sans-serif; }

/* ── 登入遮罩 ── */
.login-overlay { position: fixed; inset: 0; background: var(--paper); display: flex; align-items: center; justify-content: center; z-index: 999; flex-direction: column; gap: 1.5rem; }
.login-box { background: #fff; border-radius: 12px; padding: 2.5rem 2.5rem; text-align: center; max-width: 540px; width: 92%; box-shadow: 0 8px 40px rgba(0,0,0,.15); }
.login-box h2 { font-family: 'Noto Serif TC', serif; font-size: 1.3rem; margin-bottom: .6rem; color: var(--ink); }
.login-box p { font-size: .88rem; color: #888; margin-bottom: 1.8rem; line-height: 1.6; }
.login-overlay.hidden { display: none; }

/* ── 主內容 ── */
.main { max-width: 1100px; margin: 0 auto; padding: 1.5rem; }

/* ── 操作列 ── */
.toolbar { display: flex; align-items: center; justify-content: space-between; margin-bottom: 1.5rem; flex-wrap: wrap; gap: .75rem; }
.toolbar h2 { font-family: 'Noto Serif TC', serif; font-size: 1.1rem; }
.btn { padding: .45rem 1.1rem; border-radius: 4px; font-size: .88rem; font-family: 'Noto Sans TC', sans-serif; font-weight: 500; cursor: pointer; border: none; transition: opacity .15s; }
.btn:hover { opacity: .88; }
.btn-primary { background: var(--ink); color: #fff; }
.btn-ghost { background: transparent; border: 1px solid var(--line); color: var(--ink-soft, #3a3a5c); }

/* ── 統計卡片 ── */
.stat-row { display: grid; grid-template-columns: repeat(4, 1fr); gap: 1rem; margin-bottom: 1.5rem; }
.stat-card { background: #fff; border: 1px solid var(--line); border-radius: 4px; padding: 1rem 1.2rem; display: flex; flex-direction: column; gap: .25rem; }
.stat-num { font-family: 'Noto Serif TC', serif; font-size: 2rem; font-weight: 700; line-height: 1; }
.stat-label { font-size: .78rem; color: var(--ink-soft, #3a3a5c); }
.stat-red { border-left: 4px solid #c0392b; }
.stat-yellow { border-left: 4px solid #e6a817; }
.stat-green { border-left: 4px solid var(--ok); }
.stat-all { border-left: 4px solid var(--line); }

/* ── 案件卡片 ── */
.case-grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(320px, 1fr)); gap: 1rem; }
.case-card { background: #fff; border: 1px solid var(--line); border-radius: 4px; overflow: hidden; transition: box-shadow .15s; cursor: pointer; }
.case-card:hover { box-shadow: 0 4px 16px rgba(26,26,46,.1); }
.case-card-head { padding: .7rem 1rem; display: flex; align-items: center; gap: .5rem; border-bottom: 1px solid var(--paper); }
.light-dot { width: 10px; height: 10px; border-radius: 50%; flex-shrink: 0; }
.light-red { background: #c0392b; box-shadow: 0 0 0 3px rgba(192,57,43,.2); }
.light-yellow { background: #e6a817; box-shadow: 0 0 0 3px rgba(230,168,23,.2); }
.light-green { background: var(--ok); box-shadow: 0 0 0 3px rgba(26,92,46,.2); }
.light-none { background: var(--line); }
.case-name { font-weight: 600; font-size: .9rem; flex: 1; }
.case-card-body { padding: .75rem 1rem; font-size: .82rem; color: #555; line-height: 1.7; }
.case-card-foot { padding: .5rem 1rem; background: var(--paper); display: flex; align-items: center; justify-content: space-between; font-size: .75rem; color: var(--line); }
.stage-badge { font-size: .7rem; padding: 2px 8px; border-radius: 20px; background: var(--warm); color: var(--ink-soft, #3a3a5c); border: 1px solid var(--line); }
.deadline-tag { font-size: .75rem; padding: 2px 8px; border-radius: 20px; }
.dl-red { background: var(--accent-pale); color: var(--accent); border: 1px solid #e8b0b0; }
.dl-yellow { background: var(--warn-light); color: var(--warn); border: 1px solid #f0d080; }
.dl-green { background: var(--ok-light); color: var(--ok); border: 1px solid #a8d5b5; }
.empty-state { text-align: center; padding: 4rem 1rem; color: #aaa; }
.empty-state .icon { font-size: 3rem; margin-bottom: 1rem; }

/* ── Modal 共用 ── */
.modal-overlay { position: fixed; inset: 0; background: rgba(26,26,46,.55); display: none; align-items: center; justify-content: center; z-index: 500; padding: 1rem; }
.modal-overlay.show { display: flex; }
.modal-box { background: #fff; border-radius: 6px; max-width: 500px; width: 100%; box-shadow: 0 8px 40px rgba(0,0,0,.25); overflow: hidden; animation: fadeUp .2s ease; display: flex; flex-direction: column; max-height: 90vh; }
@keyframes fadeUp { from { transform: translateY(12px); opacity: 0; } to { transform: none; opacity: 1; } }
.modal-head { background: var(--ink); color: #fff; padding: 1rem 1.5rem; font-family: 'Noto Serif TC', serif; font-size: 1rem; font-weight: 700; flex-shrink: 0; }
.modal-body { padding: 1.5rem; display: flex; flex-direction: column; gap: 1rem; overflow-y: auto; }
.field label { display: block; font-size: .8rem; font-weight: 500; color: #555; margin-bottom: .3rem; }
.field input, .field select { width: 100%; padding: .45rem .75rem; border: 1px solid var(--line); border-radius: 4px; font-family: 'Noto Sans TC', sans-serif; font-size: .9rem; outline: none; }
.field input:focus, .field select:focus { border-color: var(--ink); }
.modal-foot { padding: 1rem 1.5rem; background: var(--warm); display: flex; gap: .75rem; justify-content: flex-end; flex-shrink: 0; }
.spinner { display: inline-block; width: 20px; height: 20px; border: 2px solid var(--line); border-top-color: var(--ink); border-radius: 50%; animation: spin .7s linear infinite; }
@keyframes spin { to { transform: rotate(360deg); } }
.loading-msg { text-align: center; padding: 3rem; color: #aaa; }

/* ── 推進階段 Modal 專用 ── */
.advance-modal-box { max-width: 480px; }
.advance-modal-head { background: #1a5c2e; }
.milestone-btn { display: block; width: 100%; padding: .5rem .75rem; margin-bottom: .4rem; background: #f5f3ee; border: 1px solid var(--line); border-radius: 4px; text-align: left; font-family: "Noto Sans TC",sans-serif; font-size: .85rem; cursor: pointer; transition: background .12s; }
.milestone-btn:hover { background: var(--warm); }
.milestone-btn.selected { background: #ddeeff; border-color: #a0c0e0; font-weight: 600; }

@media (max-width: 600px) {
  .stat-row { grid-template-columns: repeat(2, 1fr); }
  .case-grid { grid-template-columns: 1fr; }
}
</style>
</head>
<body>

<!-- 登入遮罩 -->
<div class="login-overlay" id="loginOverlay">
  <div class="login-box">
    <h2>🏫 校園霸凌事件處理系統</h2>
    <p>請使用 Google 帳號登入，以利系統區分您的案件資料與行政權限。</p>
    
    <div id="g_id_onload"
      data-client_id="708047059390-2qhkln2rq34enarpa3ipucukm7bbl97m.apps.googleusercontent.com"
      data-callback="handleCredential"
      data-auto_prompt="false"
      data-locale="zh-TW">
    </div>
    <div style="display:flex;justify-content:center;margin-top:.5rem;">
      <div class="g_id_signin" data-type="standard" data-size="large" data-theme="filled_blue" data-text="sign_in_with" data-shape="rectangular" data-locale="zh-TW"></div>
    </div>
    
    <div style="margin-top:1.5rem;border-top:1px solid #eee;padding-top:.85rem;">
      <a href="./index.html" style="font-size:.8rem;color:#888;text-decoration:none;display:flex;align-items:center;justify-content:center;gap:.3rem;">📋 僅瀏覽表單系統（不需登入）</a>
    </div>
  </div>
</div>

<header class="header">
  <h1>🏫 校園霸凌事件處理系統</h1>
  <div class="header-right">
    <span class="user-info" id="userEmail"></span>
    <button class="btn-logout" onclick="logout()">登出</button>
  </div>
</header>

<main class="main">
  <div class="toolbar">
    <h2>案件列表</h2>
    <div style="display:flex;gap:.5rem;">
      <button class="btn btn-ghost" onclick="loadCases()">🔄 重新整理</button>
      <button class="btn btn-primary" onclick="openNewCaseModal()">＋ 新增案件</button>
    </div>
  </div>

  <div class="stat-row" id="statRow">
    <div class="stat-card stat-all"><div class="stat-num" id="statAll">—</div><div class="stat-label">總案件數</div></div>
    <div class="stat-card stat-red"><div class="stat-num" id="statRed" style="color:#c0392b;">—</div><div class="stat-label">🔴 緊急（≤3天）</div></div>
    <div class="stat-card stat-yellow"><div class="stat-num" id="statYellow" style="color:#e6a817;">—</div><div class="stat-label">🟡 注意（4–7天）</div></div>
    <div class="stat-card stat-green"><div class="stat-num" id="statGreen" style="color:var(--ok);">—</div><div class="stat-label">🟢 正常（>7天）</div></div>
  </div>

  <div id="caseArea">
    <div class="loading-msg"><div class="spinner"></div><p style="margin-top:.75rem;">載入中...</p></div>
  </div>
</main>

<!-- 新增案件 Modal -->
<div class="modal-overlay" id="newCaseModal">
  <div class="modal-box">
    <div class="modal-head">新增案件</div>
    <div class="modal-body">
      <div class="field">
        <label>案件編號（校安通報序號）</label>
        <input type="text" id="newCaseId" placeholder="例：1234567，留空則自動產生" maxlength="40">
        <div style="font-size:.75rem;color:#aaa;margin-top:.25rem;">建議填入校安通報序號，方便後續追蹤對應</div>
      </div>
      <div class="field">
        <label>案件名稱 *</label>
        <input type="text" id="newCaseName" placeholder="例：114學年第1學期 甲班事件">
      </div>
      <div class="field">
        <label>學校名稱</label>
        <input type="text" id="newSchool" placeholder="例：內湖國小">
      </div>
      <div class="field">
        <label>案件類型</label>
        <select id="newCaseType">
          <option value="生對生">生對生</option>
        </select>
      </div>
      <div class="field">
        <label>知悉日期 *</label>
        <input type="date" id="newAwareDate">
        <div style="font-size:.75rem;color:#8b1a1a;margin-top:.25rem;">※ 僅起算24小時校安通報及社政通報。<br>成案（20工作日審查小組決議）需在建立後，點擊專案卡片上的「推進」進行勾選確認。</div>
      </div>
    </div>
    <div class="modal-foot">
      <button class="btn btn-ghost" onclick="closeNewCaseModal()">取消</button>
      <button class="btn btn-primary" id="createCaseBtn" onclick="createCase()">建立案件</button>
    </div>
  </div>
</div>

<!-- 推進階段 Modal -->
<div class="modal-overlay" id="advanceModal">
  <div class="modal-box advance-modal-box">
    <div class="modal-head advance-modal-head">✅ 推進階段</div>
    <div class="modal-body">
      <div>
        <div style="font-size:.8rem;font-weight:500;color:#555;margin-bottom:.5rem;" id="milestoneTitle">選擇已完成的里程碑：</div>
        <div id="milestoneList"></div>
      </div>
      <div class="field" id="advanceDoneDateField">
        <label style="font-size:.8rem;font-weight:500;color:#555;">完成日期 *</label>
        <input type="date" id="advanceDoneDate" style="width:100%;padding:.45rem .75rem;border:1px solid var(--line);border-radius:4px;font-size:.9rem;">
      </div>
      <div id="advancePreview" style="display:none;background:#f0faf4;border-radius:4px;padding:.75rem;font-size:.82rem;color:#1a5c2e;line-height:1.7;"></div>
    </div>
    <div class="modal-foot">
      <button class="btn btn-ghost" onclick="closeAdvanceModal()">取消</button>
      <button class="btn btn-primary" id="advanceConfirmBtn" onclick="confirmAdvance()" disabled style="opacity:.45;">確認推進</button>
    </div>
  </div>
</div>

<!-- 系統專屬美化彈窗 -->
<div class="modal-overlay" id="sysAlertModal" style="z-index: 9999;">
  <div class="modal-box" style="max-width: 420px; text-align: center;">
    <div class="modal-head" style="background: var(--info); font-size: 1.1rem;" id="sysAlertTitle">系統提示</div>
    <div class="modal-body" style="padding: 2.5rem 1.5rem; font-size: .95rem; color: #333; line-height: 1.6; white-space: pre-wrap;" id="sysAlertMsg"></div>
    <div class="modal-foot" style="justify-content: center; background: #fff; border-top: 1px solid var(--paper);">
      <button class="btn btn-primary" style="min-width: 120px;" onclick="closeSysAlert()">確定</button>
    </div>
  </div>
</div>

<script>
// ── 設定
const GAS_URL = 'https://script.google.com/macros/s/AKfycbwXSckDnFFrjbr-IPdRmnJAcebfmg_gP1n5r2TLC3IEmNIrdGRBuaql4GAuDSnW8LP7dw/exec'; 

let currentEmail = '';
let currentToken = '';
let casesCache = [];

function customAlert(msg, title = '系統提示') {
  document.getElementById('sysAlertTitle').textContent = title;
  document.getElementById('sysAlertMsg').textContent = msg;
  document.getElementById('sysAlertModal').classList.add('show');
}
function closeSysAlert() {
  document.getElementById('sysAlertModal').classList.remove('show');
}

function handleCredential(response) {
  const base64 = response.credential.split('.')[1].replace(/-/g, '+').replace(/_/g, '/');
  const payload = JSON.parse(atob(base64));
  currentEmail = payload.email;
  currentToken = response.credential;
  sessionStorage.setItem('bully_email', currentEmail);
  sessionStorage.setItem('bully_token', currentToken);
  document.getElementById('userEmail').textContent = currentEmail;
  document.getElementById('loginOverlay').classList.add('hidden');
  loadCases();
}

function logout() {
  currentEmail = ''; currentToken = ''; casesCache = [];
  sessionStorage.removeItem('bully_email'); sessionStorage.removeItem('bully_token');
  document.getElementById('loginOverlay').classList.remove('hidden');
  document.getElementById('userEmail').textContent = '';
  document.getElementById('caseArea').innerHTML = '<div class="loading-msg"><p>請重新登入</p></div>';
}

async function callGAS(action, data = {}) {
  const body = JSON.stringify({ action, email: currentEmail, token: currentToken, ...data });
  const res = await fetch(GAS_URL, { method: 'POST', headers: { 'Content-Type': 'text/plain' }, body });
  const result = await res.json();
  
  // 🛡️ 全域攔截器：如果後端回報 Token 無效或拒絕存取
  if (!result.ok && result.error && result.error.includes('拒絕存取')) {
    // 1. 跳出明確的提示視窗
    alert('⏳ 登入時效已過！為保護校安資料安全，請重新登入。');
    
    // 2. 清除已經失效的鑰匙與記憶
    sessionStorage.removeItem('bully_token');
    sessionStorage.removeItem('bully_email');
    
    // 3. 強制重整網頁，把使用者踢回登入畫面
    location.reload(); 
  }
  
  return result;
}

async function loadCases() {
  document.getElementById('caseArea').innerHTML = '<div class="loading-msg"><div class="spinner"></div><p style="margin-top:.75rem;">載入中...</p></div>';
  try {
    const result = await callGAS('bully_list');
    if (!result.ok) throw new Error(result.error);
    casesCache = result.cases;
    renderCases(casesCache);
  } catch (e) {
    document.getElementById('caseArea').innerHTML = `<div class="loading-msg"><p style="color:#c0392b;">載入失敗：${e.message}</p></div>`;
  }
}

function renderCases(cases) {
  const active = cases.filter(c => c.status === '進行中' || c.status === '通報列管中');
  document.getElementById('statAll').textContent = active.length;
  document.getElementById('statRed').textContent = active.filter(c => c.deadline?.light === 'red').length;
  document.getElementById('statYellow').textContent = active.filter(c => c.deadline?.light === 'yellow').length;
  document.getElementById('statGreen').textContent = active.filter(c => c.deadline?.light === 'green').length;

  if (cases.length === 0) {
    document.getElementById('caseArea').innerHTML = `<div class="empty-state"><div class="icon">📋</div><p>尚無案件。點選「新增案件」開始建立。</p></div>`;
    return;
  }

  const stageLabels = {
    'PRE_STAGE': '00 通報列管', 'STAGE_01': '01 知悉受理', 'STAGE_02': '02 審查小組',
    'STAGE_03': '03 處理小組', 'STAGE_04': '04 會前會', 'STAGE_05A': '05A 調和',
    'STAGE_05B': '05B 調查', 'STAGE_06': '06 防制委員會', 'STAGE_07': '07 終局處理', 'STAGE_08': '08 輔導追蹤'
  };

  const cards = cases.map(c => {
    const dl = c.deadline;
    const lightClass = dl ? `light-${dl.light}` : 'light-none';
    const dlTag = dl ? `<span class="deadline-tag dl-${dl.light}">${dl.days_left < 0 ? `逾期 ${-dl.days_left} 天` : `${dl.days_left} 天`} | ${dl.milestone}</span>` : '';
    const updatedDate = c.updated_at ? new Date(c.updated_at).toLocaleDateString('zh-TW') : '—';
    
    // 🛡️ 模組三：動態生成 05A/05B 的軌道切換按鈕
    let switchBtn = '';
    const daysLeft = dl ? dl.days_left : 99; // 取出剩餘天數供防呆使用
    if (c.stage === 'STAGE_05A') {
      switchBtn = `<button class="btn btn-ghost" style="padding:.2rem .6rem;font-size:.72rem;background:#fff0f0;border-color:#ffcdd2;color:#c62828;margin-right:.5rem;" onclick="event.stopPropagation();switchStage05('${c.case_id}', 'STAGE_05A', 'STAGE_05B', ${daysLeft})">切換調查 🔄</button>`;
    } else if (c.stage === 'STAGE_05B') {
      switchBtn = `<button class="btn btn-ghost" style="padding:.2rem .6rem;font-size:.72rem;background:#f3e5f5;border-color:#e1bee7;color:#6a1b9a;margin-right:.5rem;" onclick="event.stopPropagation();switchStage05('${c.case_id}', 'STAGE_05B', 'STAGE_05A', ${daysLeft})">重啟調和 🔄</button>`;
    }

    return `
    <div class="case-card" onclick="openCase('${c.case_id}')">
      <div class="case-card-head">
        <div class="light-dot ${lightClass}"></div>
        <div class="case-name">${c.case_name}</div>
        <span class="stage-badge">${stageLabels[c.stage] || c.stage}</span>
      </div>
      <div class="case-card-body">
        <div>🏫 ${c.school || '（未填學校）'}</div>
        <div>📋 ${c.case_type} | ${c.status}</div>
        ${dl ? `<div style="margin-top:.3rem;">${dlTag}</div>` : ''}
      </div>
      <div class="case-card-foot">
        <span>更新：${updatedDate}</span>
        <div>
          ${switchBtn}
          <button class="btn btn-ghost" style="padding:.2rem .6rem;font-size:.72rem;background:#f0faf4;border-color:#a8d5b5;color:#1a5c2e;" onclick="event.stopPropagation();openAdvanceModal('${c.case_id}','${c.case_name}','${c.stage}')">推進 →</button>
        </div>
      </div>
    </div>`;
  });
  document.getElementById('caseArea').innerHTML = `<div class="case-grid">${cards.join('')}</div>`;
}

  // 🛡️ STAGE 05 調和/調查 雙向切換防呆引擎
async function switchStage05(caseId, fromStage, toStage, daysLeft) {
  // 1. 單向證據防火牆與文件重簽防呆
  if (fromStage === 'STAGE_05A' && toStage === 'STAGE_05B') {
    const warn1 = confirm('【⚖️ 證據排除防火牆】\n\n依法規，調和過程中當事人「不利於己之陳述」，絕對不得作為後續調查報告之基礎。\n\n請確認已向調查小組宣達此原則，並確認切換為「調查程序」？');
    if (!warn1) return;
  } else if (fromStage === 'STAGE_05B' && toStage === 'STAGE_05A') {
    const warn2 = confirm('【🤝 意願重簽確認】\n\n請確認已於調查紀錄載明「中斷調查意願」。\n切換後，請務必讓雙方重新簽署【4-2 調和意願書】。\n\n確認切換回「調和程序」？');
    if (!warn2) return;
  }

  // 2. 期限檢核與智能展延詢問
  let milestoneToTrigger = ''; // 預設不傳里程碑，後端時鐘就會無縫接軌繼續算
  if (daysLeft < 15) {
    const extend = confirm(`【⚠️ 期限警示】\n\n本案處理期限僅剩 ${daysLeft} 天！\n\n是否要在切換程序的同時，依法向防制委員會「自動申請展延 1 個月」？\n(若選取消，將僅切換程序，期限維持不變)`);
    if (extend) {
      milestoneToTrigger = '第一次展延'; // 觸發後端 GAS 的展延 1 個月計算
    }
  }

  // 3. 發送 API 請求執行切換
  document.getElementById('caseArea').innerHTML = '<div class="loading-msg"><div class="spinner"></div><p>程序軌道切換中，請稍候...</p></div>';
  try {
    const today = new Date().toISOString().split('T')[0];
    const res = await callGAS('bully_advance_stage', {
      case_id: caseId,
      stage: toStage,
      milestone: milestoneToTrigger, 
      done_date: today
    });
    
    if (!res.ok) throw new Error(res.error);
    
    alert('✅ 案件程序與期限狀態切換成功！');
    loadCases(); // 重新刷出最新列表
  } catch (err) {
    alert('❌ 切換失敗：' + err.message);
    loadCases();
  }
}

function openCase(caseId) { window.location.href = `./index.html?case_id=${caseId}&email=${encodeURIComponent(currentEmail)}`; }

function openNewCaseModal() {
  document.getElementById('newCaseModal').classList.add('show');
  document.getElementById('newAwareDate').value = new Date().toISOString().split('T')[0];
}
function closeNewCaseModal() { document.getElementById('newCaseModal').classList.remove('show'); }

async function createCase() {
  const confirmBtn = document.getElementById('createCaseBtn');
  confirmBtn.disabled = true; confirmBtn.textContent = '建立中…';
  const customId = document.getElementById('newCaseId').value.trim();
  const name = document.getElementById('newCaseName').value.trim();
  const awareDate = document.getElementById('newAwareDate').value;

  if (!name || !awareDate) {
    confirmBtn.disabled = false; confirmBtn.textContent = '建立案件';
    customAlert('請填寫案件名稱與知悉日期', '⚠️ 填寫未完整'); return;
  }

  try {
    const result = await callGAS('bully_save_with_deadlines', {
      case_id: customId || undefined, case_name: name, school: document.getElementById('newSchool').value.trim(), case_type: document.getElementById('newCaseType').value,
      stage: 'PRE_STAGE', status: '通報列管中', report_date: awareDate, data_json: JSON.stringify({ aware_date: awareDate })
    });
    if (!result.ok) throw new Error(result.error);
    closeNewCaseModal(); await loadCases();
    customAlert(`✅ 案件已建立！\n目前僅起算24小時校安/社政通報。\n如需成案(起算20工作日審查小組期限)，請點選卡片上的「推進」進行勾選確認。`, '🎉 新增成功');
  } catch (e) { 
    customAlert('建立失敗：\n' + e.message, '❌ 發生錯誤');
  } finally { confirmBtn.disabled = false; confirmBtn.textContent = '建立案件'; }
}

const MILESTONES = {
  'PRE_STAGE': ['接獲檢舉(書面/言詞/校內發現)', '視同檢舉(機關/媒體移送)', '撤回檢舉但核可職權續查'],
  'STAGE_02': ['決議受理', '決議不受理'],
  'STAGE_03': ['處理小組組成完成', '第一次調和/調查會議召開'],
  'STAGE_04': ['第一次調和會議召開(進調和)', '第一次調查會議召開(進調查)'],
  'STAGE_05A': ['調和成立', '調和不成立(切換調查)'],
  'STAGE_05B': ['調查報告完成', '雙方產生調和意願(轉回調和)', '展延申請']
};
const NEXT_STAGE = { 'PRE_STAGE':'STAGE_01', 'STAGE_01':'STAGE_02', 'STAGE_02':'STAGE_03', 'STAGE_03':'STAGE_04', 'STAGE_04':'STAGE_05A', 'STAGE_05A':'STAGE_06', 'STAGE_05B':'STAGE_06', 'STAGE_06':'STAGE_07', 'STAGE_07':'STAGE_08', 'STAGE_08':'CLOSED' };
const OVERRIDE_NEXT = { '第一次調查會議召開(進調查)': 'STAGE_05B', '調和不成立(切換調查)': 'STAGE_05B', '雙方產生調和意願(轉回調和)': 'STAGE_05A', '決議不受理': 'CLOSED' };

let _advanceCaseId = '', _advanceCurrentStage = '', _advanceSelectedMilestone = '';

function openAdvanceModal(caseId, caseName, stage) {
  _advanceCaseId = caseId; _advanceCurrentStage = stage; _advanceSelectedMilestone = '';
  document.getElementById('advanceDoneDateField').style.display = 'block';
  document.getElementById('milestoneTitle').style.display = 'block';

  const list = document.getElementById('milestoneList');
  if (stage === 'PRE_STAGE' || stage === 'STAGE_01') {
    document.getElementById('milestoneTitle').style.display = 'none';
    document.getElementById('advanceDoneDateField').style.display = 'none';
    list.innerHTML = `<div style="background:#f0faf4;border-radius:4px;padding:.75rem;border-left:3px solid #a8d5b5;margin-bottom:1rem;">
      <div style="font-size:.82rem;font-weight:700;color:#1a5c2e;margin-bottom:.5rem;">📋 確認成案條件 → 啟動 20 工作日審查倒數</div>
      <div style="font-size:.78rem;font-weight:600;color:#555;margin-bottom:.3rem;">請勾選法定成案要件（單選）：</div>
      ${MILESTONES['PRE_STAGE'].map(m => `<button class="milestone-btn" onclick="selectMile01(this, '${m}')">${m}</button>`).join('')}
      <div style="margin-top:.75rem;">
        <label style="font-size:.75rem;color:#555;display:block;margin-bottom:.2rem;">上列要件之觸發日期 *</label>
        <input type="date" id="s01_complain_date" onchange="checkMile01Ready()" style="padding:.3rem .5rem;border:1px solid #c5bfb0;border-radius:4px;font-size:.82rem;width:100%;">
      </div>
    </div>`;
  } else {
    list.innerHTML = (MILESTONES[stage] || ['此階段已完成']).map(m => `<button class="milestone-btn" onclick="selectMile('${m}',this)">${m}</button>`).join('');
  }

  document.getElementById('advanceDoneDate').value = new Date().toISOString().split('T')[0];
  document.getElementById('advancePreview').style.display = 'none';
  const btn = document.getElementById('advanceConfirmBtn'); btn.disabled = true; btn.style.opacity = '.45';
  document.getElementById('advanceModal').classList.add('show');
}

function selectMile01(el, mile) {
  window._m01_mile = mile; document.querySelectorAll('#milestoneList .milestone-btn').forEach(b => b.classList.remove('selected')); el.classList.add('selected'); checkMile01Ready();
}
function checkMile01Ready() {
  const date = document.getElementById('s01_complain_date')?.value;
  const mile = window._m01_mile;
  const preview = document.getElementById('advancePreview');
  const btn = document.getElementById('advanceConfirmBtn');
  if(!date || !mile) { preview.style.display='none'; btn.disabled=true; btn.style.opacity='.45'; return; }
  _advanceSelectedMilestone = mile;
  preview.style.display = 'block'; preview.innerHTML = `✅ 成案要件：<strong>${mile}</strong><br>📅 觸發日期：<strong>${date}</strong><br>📍 推進至：<strong>01 知悉受理 / 02 審查小組</strong>（起算20工作日期限）`;
  btn.disabled = false; btn.style.opacity = '1';
}

function selectMile(m, el) {
  _advanceSelectedMilestone = m; document.querySelectorAll('#milestoneList .milestone-btn').forEach(b => b.classList.remove('selected')); el.classList.add('selected');
  const preview = document.getElementById('advancePreview'); preview.style.display = 'block';
  const next = OVERRIDE_NEXT[m] || NEXT_STAGE[_advanceCurrentStage] || _advanceCurrentStage;
  
  // 法規防呆與證據防火牆警告
  let warn = '';
  if (m === '調和不成立(切換調查)') {
    warn = '<br><b style="color:var(--accent)">🔒 證據排除防火牆：調和內容不得作為調查依據。</b><br>⚠️ 調查期限無縫接軌扣除已調和天數，建議勾選自動申請展延。';
  } else if (m === '雙方產生調和意願(轉回調和)') {
    warn = '<br><b style="color:var(--info)">💡 提醒：調查事證可用於輔助調和進行。</b>';
  } else if (m === '決議不受理') {
    warn = '<br><b style="color:var(--accent)">⚠️ 防呆提醒：請先確認是否審酌準則第71條故意傷害情形。</b>';
  }

  // 調和轉調查自動展延救生圈
  const ex = m === '調和不成立(切換調查)' ? '<br><label style="display:flex;align-items:flex-start;gap:.4rem;margin-top:.5rem;background:#fff3cd;padding:.5rem;border-radius:4px;border:1px solid #f0d080;cursor:pointer;"><input type="checkbox" id="extInvestCheckbox" accent-color="#5c3a00" style="margin-top:2px;"> <span style="color:#5c3a00;font-weight:600;font-size:.8rem;line-height:1.4;">⚠️ 調查剩餘時間可能不足，同步申請展延 1 個月？</span></label>' : '';

  preview.innerHTML = `📍 預計推進至：<strong>${next==='CLOSED'?'已結案':next}</strong>${warn}${ex}`;
  const btn = document.getElementById('advanceConfirmBtn'); btn.disabled = false; btn.style.opacity = '1'; window._adv_target = next;
}

function closeAdvanceModal() { document.getElementById('advanceModal').classList.remove('show'); }

async function confirmAdvance() {
  let doneDate = document.getElementById('advanceDoneDate').value;
  if (_advanceCurrentStage === 'PRE_STAGE' || _advanceCurrentStage === 'STAGE_01') doneDate = document.getElementById('s01_complain_date')?.value;
  if (!doneDate || !_advanceSelectedMilestone) {
    customAlert('資料未齊全，請確實選擇日期與里程碑選項。', '⚠️ 填寫未完整'); 
    return;
  }

  const btn = document.getElementById('advanceConfirmBtn'); btn.disabled = true; btn.textContent = '處理中…';
  const ex = document.getElementById('extInvestCheckbox')?.checked || false;

  try {
    const next = window._adv_target || NEXT_STAGE[_advanceCurrentStage] || _advanceCurrentStage;
    const result = await callGAS('bully_advance_stage', { case_id: _advanceCaseId, milestone: _advanceSelectedMilestone, done_date: doneDate, stage: next, status: next === 'CLOSED' ? '已結案' : '進行中', request_extension: ex });
    if (!result.ok) throw new Error(result.error);
    closeAdvanceModal(); await loadCases(); 
    customAlert(`✅ 推進成功！目前已進入下一個法定階段。`, '🎉 更新完成');
  } catch(e) { 
    customAlert('推進失敗：\n' + e.message, '❌ 發生錯誤'); 
  } finally { btn.disabled = false; btn.textContent = '確認推進'; }
}

window.onload = function() {
  const e = sessionStorage.getItem('bully_email'), t = sessionStorage.getItem('bully_token');
  if (e && t) { currentEmail = e; currentToken = t; document.getElementById('userEmail').textContent = e; document.getElementById('loginOverlay').classList.add('hidden'); loadCases(); }
};
</script>
