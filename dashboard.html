<!DOCTYPE html>
<html lang="zh-TW">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>校園霸凌事件處理系統 — 案件儀表板</title>
<script src="https://accounts.google.com/gsi/client" async defer></script>
<style>
@import url('https://fonts.googleapis.com/css2?family=Noto+Serif+TC:wght@400;600;700&family=Noto+Sans+TC:wght@300;400;500&display=swap');
:root { --ink: #1a1a2e; --paper: #f5f3ee; --warm: #ede9e0; --line: #c5bfb0; --accent: #8b1a1a; --ok: #1a5c2e; --warn: #7a4a00; --info: #1a3a5c; --ok-light: #d4edda; --warn-light: #fff3cd; --accent-pale: #fdf0f0; }
*, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
body { font-family: 'Noto Sans TC', sans-serif; background: var(--paper); color: var(--ink); min-height: 100vh; font-size: 15px; }
.header { background: var(--ink); color: #fff; padding: 0 1.5rem; height: 56px; display: flex; align-items: center; justify-content: space-between; position: sticky; top: 0; z-index: 100; box-shadow: 0 2px 8px rgba(0,0,0,.3); }
.header h1 { font-family: 'Noto Serif TC', serif; font-size: 1rem; font-weight: 700; }
.login-overlay { position: fixed; inset: 0; background: var(--ink); display: flex; align-items: center; justify-content: center; z-index: 999; flex-direction: column; gap: 1.5rem; }
.login-box { background: #fff; border-radius: 12px; padding: 2.5rem; text-align: center; max-width: 440px; width: 92%; box-shadow: 0 8px 40px rgba(0,0,0,.4); }
.login-overlay.hidden { display: none; }
.main { max-width: 1100px; margin: 0 auto; padding: 1.5rem; }
.toolbar { display: flex; align-items: center; justify-content: space-between; margin-bottom: 1.5rem; flex-wrap: wrap; gap: .75rem; }
.stat-row { display: grid; grid-template-columns: repeat(4, 1fr); gap: 1rem; margin-bottom: 1.5rem; }
.stat-card { background: #fff; border: 1px solid var(--line); border-radius: 4px; padding: 1rem 1.2rem; border-left: 4px solid var(--line); }
.case-grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(320px, 1fr)); gap: 1rem; }
.case-card { background: #fff; border: 1px solid var(--line); border-radius: 4px; overflow: hidden; cursor: pointer; }
.case-card-head { padding: .7rem 1rem; display: flex; align-items: center; gap: .5rem; border-bottom: 1px solid var(--paper); }
.light-dot { width: 10px; height: 10px; border-radius: 50%; }
.light-red { background: #c0392b; } .light-yellow { background: #e6a817; } .light-green { background: var(--ok); }
.case-card-foot { padding: .5rem 1rem; background: var(--paper); display: flex; align-items: center; justify-content: space-between; font-size: .75rem; }
.modal-overlay { position: fixed; inset: 0; background: rgba(26,26,46,.55); display: none; align-items: center; justify-content: center; z-index: 500; padding: 1rem; }
.modal-overlay.show { display: flex; }
.modal-box { background: #fff; border-radius: 6px; max-width: 500px; width: 100%; overflow: hidden; }
.milestone-btn { display: block; width: 100%; padding: .6rem .75rem; margin-bottom: .4rem; background: #f5f3ee; border: 1px solid var(--line); border-radius: 4px; text-align: left; cursor: pointer; font-size: .85rem; }
.milestone-btn.selected { background: #ddeeff; border-color: #a0c0e0; font-weight: 600; }
.spinner { display: inline-block; width: 20px; height: 20px; border: 2px solid var(--line); border-top-color: var(--ink); border-radius: 50%; animation: spin .7s linear infinite; }
@keyframes spin { to { transform: rotate(360deg); } }
</style>
</head>
<body>

<div class="login-overlay" id="loginOverlay">
  <div class="login-box">
    <h2>🏫 校園霸凌事件處理系統</h2>
    <p>請使用 Google 帳號登入</p>
    <div id="g_id_onload" data-client_id="708047059390-2qhkln2rq34enarpa3ipucukm7bbl97m.apps.googleusercontent.com" data-callback="handleCredential" data-auto_prompt="false"></div>
    <div class="g_id_signin" data-type="standard"></div>
  </div>
</div>

<header class="header">
  <h1>🏫 校園霸凌事件處理系統</h1>
  <div id="userEmail" style="font-size:.8rem;opacity:.7;"></div>
</header>

<main class="main">
  <div class="toolbar">
    <h2 style="font-family:'Noto Serif TC',serif;">案件列表</h2>
    <button class="btn" style="background:var(--ink);color:#fff;padding:.5rem 1rem;border-radius:4px;cursor:pointer;" onclick="openNewCaseModal()">＋ 新增案件</button>
  </div>
  <div class="stat-row" id="statRow">
    <div class="stat-card">案件總數：<span id="statAll">-</span></div>
    <div class="stat-card" style="border-left-color:#c0392b">🔴 緊急：<span id="statRed">-</span></div>
    <div class="stat-card" style="border-left-color:#e6a817">🟡 注意：<span id="statYellow">-</span></div>
    <div class="stat-card" style="border-left-color:var(--ok)">🟢 正常：<span id="statGreen">-</span></div>
  </div>
  <div id="caseArea"></div>
</main>

<!-- 新增案件 Modal -->
<div class="modal-overlay" id="newCaseModal">
  <div class="modal-box">
    <div style="background:var(--ink);color:#fff;padding:1rem;">新增案件</div>
    <div style="padding:1.5rem;">
      <label style="display:block;font-size:.8rem;margin-bottom:.3rem;">案件名稱 *</label>
      <input type="text" id="newCaseName" style="width:100%;padding:.5rem;margin-bottom:1rem;border:1px solid var(--line);">
      <label style="display:block;font-size:.8rem;margin-bottom:.3rem;">知悉日期 *</label>
      <input type="date" id="newAwareDate" style="width:100%;padding:.5rem;border:1px solid var(--line);">
      <p style="font-size:.72rem;color:var(--accent);margin-top:.5rem;">※ 僅起算24小時校安通報。成案與審查期限需於建立後點擊「推進」勾選要件。</p>
    </div>
    <div style="padding:1rem;background:var(--warm);text-align:right;">
      <button onclick="closeNewCaseModal()" style="margin-right:.5rem;">取消</button>
      <button onclick="createCase()" id="createBtn">建立案件</button>
    </div>
  </div>
</div>

<!-- 推進階段 Modal (雙向道升級版) -->
<div class="modal-overlay" id="advanceModal">
  <div class="modal-box" style="max-width:460px;">
    <div id="advHead" style="background:var(--ok);color:#fff;padding:1rem;">✅ 推進階段</div>
    <div style="padding:1.5rem;">
      <div id="milestoneList"></div>
      <div id="dateField" style="margin-top:1rem;">
        <label id="dateLabel" style="display:block;font-size:.8rem;margin-bottom:.3rem;">完成日期 *</label>
        <input type="date" id="advanceDate" style="width:100%;padding:.5rem;border:1px solid var(--line);">
      </div>
      <div id="advancePreview" style="display:none;margin-top:1rem;padding:.75rem;background:#f0faf4;border-radius:4px;font-size:.82rem;line-height:1.6;"></div>
    </div>
    <div style="padding:1rem;background:var(--warm);text-align:right;">
      <button onclick="closeAdvanceModal()">取消</button>
      <button id="advConfirmBtn" onclick="confirmAdvance()" disabled>確認推進</button>
    </div>
  </div>
</div>

<script>
const GAS_URL = 'https://script.google.com/macros/s/AKfycbwXSckDnFFrjbr-IPdRmnJAcebfmg_gP1n5r2TLC3IEmNIrdGRBuaql4GAuDSnW8LP7dw/exec';
let currentEmail = '', currentToken = '', casesCache = [];

function handleCredential(response) {
  const payload = JSON.parse(atob(response.credential.split('.')[1].replace(/-/g,'+').replace(/_/g,'/')));
  currentEmail = payload.email; currentToken = response.credential;
  document.getElementById('userEmail').textContent = currentEmail;
  document.getElementById('loginOverlay').classList.add('hidden');
  loadCases();
}

async function callGAS(action, data = {}) {
  const res = await fetch(GAS_URL, { method: 'POST', body: JSON.stringify({ action, email: currentEmail, ...data }) });
  return await res.json();
}

async function loadCases() {
  document.getElementById('caseArea').innerHTML = '<p>載入中...</p>';
  const result = await callGAS('bully_list');
  casesCache = result.cases || [];
  renderCases(casesCache);
}

function renderCases(cases) {
  const active = cases.filter(c => c.status !== '已結案');
  document.getElementById('statAll').textContent = active.length;
  document.getElementById('statRed').textContent = active.filter(c => c.deadline?.light==='red').length;
  document.getElementById('statYellow').textContent = active.filter(c => c.deadline?.light==='yellow').length;
  document.getElementById('statGreen').textContent = active.filter(c => c.deadline?.light==='green').length;

  const stageLabels = { 'PRE_STAGE':'00 通報列管', 'STAGE_01':'01 知悉受理', 'STAGE_02':'02 審查小組', 'STAGE_03':'03 處理小組', 'STAGE_04':'04 會前會', 'STAGE_05A':'05A 調和', 'STAGE_05B':'05B 調查', 'STAGE_06':'06 防制委員會', 'STAGE_07':'07 終局處理', 'STAGE_08':'08 輔導追蹤' };
  
  document.getElementById('caseArea').innerHTML = `<div class="case-grid">${cases.map(c => `
    <div class="case-card" onclick="location.href='./index.html?case_id=${c.case_id}&email=${currentEmail}'">
      <div class="case-card-head">
        <div class="light-dot light-${c.deadline?.light || 'none'}"></div>
        <div style="flex:1;font-weight:600;">${c.case_name}</div>
        <span style="font-size:.7rem;background:#eee;padding:2px 6px;">${stageLabels[c.stage] || c.stage}</span>
      </div>
      <div style="padding:1rem;font-size:.8rem;color:#555;">
        截止任務：${c.deadline?.milestone || '無'} <br>
        剩餘天數：${c.deadline ? c.deadline.days_left + ' 天' : '-'}
      </div>
      <div class="case-card-foot">
        <span>${new Date(c.updated_at).toLocaleDateString()}</span>
        <button onclick="event.stopPropagation();openAdvanceModal('${c.case_id}','${c.stage}')" style="background:var(--ok);color:#fff;border:none;padding:2px 8px;border-radius:4px;cursor:pointer;">推進 →</button>
      </div>
    </div>`).join('')}</div>`;
}

function openNewCaseModal() { document.getElementById('newCaseModal').classList.add('show'); document.getElementById('newAwareDate').value = new Date().toISOString().split('T')[0]; }
function closeNewCaseModal() { document.getElementById('newCaseModal').classList.remove('show'); }

async function createCase() {
  const name = document.getElementById('newCaseName').value, date = document.getElementById('newAwareDate').value;
  if(!name || !date) return alert('請填寫完整');
  await callGAS('bully_save_with_deadlines', { case_name: name, report_date: date, stage: 'PRE_STAGE', status: '通報列管中' });
  closeNewCaseModal(); loadCases();
}

const MILESTONES = {
  'PRE_STAGE': ['接獲檢舉(書面/言詞/校內發現)', '視同檢舉(機關/媒體移送)', '撤回檢舉但核可職權續查'],
  'STAGE_02': ['決議受理', '決議不受理'],
  'STAGE_04': ['第一次調和會議召開(進調和)', '第一次調查會議召開(進調查)'],
  'STAGE_05A': ['調和成立', '調和不成立(切換調查)'],
  'STAGE_05B': ['調查報告完成', '雙方產生調和意願(轉回調和)', '申請展延']
};
const NEXT_STAGE = { 'PRE_STAGE':'STAGE_01', 'STAGE_01':'STAGE_02', 'STAGE_02':'STAGE_03', 'STAGE_03':'STAGE_04', 'STAGE_04':'STAGE_05A', 'STAGE_05A':'STAGE_06', 'STAGE_05B':'STAGE_06' };

let _advId = '', _advStage = '', _advMile = '';

function openAdvanceModal(id, stage) {
  _advId = id; _advStage = stage; _advMile = '';
  const list = MILESTONES[stage] || ['完成此階段任務'];
  document.getElementById('milestoneList').innerHTML = list.map(m => `<button class="milestone-btn" onclick="selectMile('${m}', this)">${m}</button>`).join('');
  document.getElementById('advanceDate').value = new Date().toISOString().split('T')[0];
  document.getElementById('advancePreview').style.display = 'none';
  document.getElementById('advConfirmBtn').disabled = true;
  document.getElementById('advanceModal').classList.add('show');
}

function selectMile(m, btn) {
  _advMile = m;
  document.querySelectorAll('.milestone-btn').forEach(b => b.classList.remove('selected'));
  btn.classList.add('selected');
  
  let next = NEXT_STAGE[_advStage] || _advStage;
  if (m === '第一次調查會議召開(進調查)') next = 'STAGE_05B';
  if (m === '調和不成立(切換調查)') next = 'STAGE_05B';
  if (m === '雙方產生調和意願(轉回調和)') next = 'STAGE_05A';
  if (m === '決議不受理') next = 'CLOSED';

  const preview = document.getElementById('advancePreview');
  preview.style.display = 'block';
  
  // 雙向道證據防火牆邏輯
  let warning = '';
  if (m === '調和不成立(切換調查)') {
    warning = '<br><b style="color:var(--accent)">🔒 證據排除防火牆：調和內容不得作為調查依據。</b><br>⚠️ 剩餘時間可能不足，建議同步申請展延。';
  } else if (m === '雙方產生調和意願(轉回調和)') {
    warning = '<br><b style="color:var(--info)">💡 提醒：調查事證可用於輔助調和進行。</b>';
  }

  preview.innerHTML = `📍 預計推進至：<b>${next}</b> ${warning}`;
  document.getElementById('advConfirmBtn').disabled = false;
  window._targetStage = next;
}

async function confirmAdvance() {
  const date = document.getElementById('advanceDate').value;
  await callGAS('bully_advance_stage', { case_id: _advId, milestone: _advMile, done_date: date, stage: window._targetStage });
  document.getElementById('advanceModal').classList.remove('show');
  loadCases();
}
function closeAdvanceModal() { document.getElementById('advanceModal').classList.remove('show'); }
</script>
</body>
</html>
